services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  superset:
    image: apache/superset:4.1.2
    environment:
      SUPERSET_SECRET_KEY: testsecretkey
      SUPERSET_LOAD_EXAMPLES: "no"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_DB: superset
      DATABASE_USER: superset
      DATABASE_PASSWORD: superset
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    volumes:
      - ./scripts/superset-init.sh:/docker-entrypoint-initdb.d/superset-init.sh
      - ./scripts/superset_config.py:/app/superset_config.py
    command:
      - /bin/sh
      - -c
      - |
        superset db upgrade &&
        superset fab create-admin \
          --username admin \
          --firstname Admin \
          --lastname User \
          --email admin@example.com \
          --password admin &&
        superset init &&
        superset run -h 0.0.0.0 -p 8088
